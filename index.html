<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="iWonde Test">
  <meta name="theme-color" content="#000000">
  <title>iWonde Test</title>
  
  <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogImlXb25kZSBUZXN0IEFwcCIsCiAgInNob3J0X25hbWUiOiAiaVdvbmRlIiwKICAic3RhcnRfdXJsIjogIi8iLAogICJkaXNwbGF5IjogInN0YW5kYWxvbmUiLAogICJiYWNrZ3JvdW5kX2NvbG9yIjogIiMwMDAwMDAiLAogICJ0aGVtZV9jb2xvciI6ICIjMDAwMDAwIiwKICAib3JpZW50YXRpb24iOiAicG9ydHJhaXQiLAogICJpY29ucyI6IFsKICAgIHsKICAgICAgInNyYyI6ICJkYXRhOmltYWdlL3N2Zyt4bWw7YmFzZTY0LFBITjJaeUI0Yld4dWN6MGlhSFIwY0RvdkwzZDNkeTUzTXk1dmNtY3ZNakF3TUM5emRtY2lJSFpwWlhkQ2IzZzlJakFnTUNBeE1EQWdNVEF3SWo0OGNtVmpkQ0IzYVdSMGFEMGlNVEF3SWlCb1pXbG5hSFE5SWpFd01DSWdabWxzYkQwaUl6RXdZamM0TVNJdlBqeHdZWFJvSUdROUlrMDNNQ0ExTUVneU1Hd3hNR3d4TUZZNE1Hd3hNR3d4TUV3M01DQTFNSHBpTVRBZ01UQWdNQ0F4SURFZ01DQXhOV3d4TUZZek5Xd3RNVEJNTnpBZ05UQjZJaUJtYVd4c0pUb2lJekF3TUNJZ2MzUnliMnRsUFNJak1UQmlOemN4SWlCemRISnZhMlV0ZDJsa2RHZzlJak1pTHo0OEwzTjJaejQ9IiwKICAgICAgInNpemVzIjogIjE5MngxOTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9zdmcreG1sIgogICAgfSwKICAgIHsKICAgICAgInNyYyI6ICJkYXRhOmltYWdlL3N2Zyt4bWw7YmFzZTY0LFBITjJaeUI0Yld4dWN6MGlhSFIwY0RvdkwzZDNkeTUzTXk1dmNtY3ZNakF3TUM5emRtY2lJSFpwWlhkQ2IzZzlJakFnTUNBeE1EQWdNVEF3SWo0OGNtVmpkQ0IzYVdSMGFEMGlNVEF3SWlCb1pXbG5hSFE5SWpFd01DSWdabWxzYkQwaUl6RXdZamM0TVNJdlBqeHdZWFJvSUdROUlrMDNNQ0ExTUVneU1Hd3hNR3d4TUZZNE1Hd3hNR3d4TUV3M01DQTFNSHBpTVRBZ01UQWdNQ0F4SURFZ01DQXhOV3d4TUZZek5Xd3RNVEJNTnpBZ05UQjZJaUJtYVd4c0pUb2lJekF3TUNJZ2MzUnliMnRsUFNJak1UQmlOemN4SWlCemRISnZhMlV0ZDJsa2RHZzlJak1pTHo0OEwzTjJaejQ9IiwKICAgICAgInNpemVzIjogIjUxMng1MTIiLAogICAgICAidHlwZSI6ICJpbWFnZS9zdmcreG1sIgogICAgfQogIF0KfQ==">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; position: fixed; width: 100%; height: 100%; overflow: hidden; }
    #root { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
          self.addEventListener('install', (e) => {
            e.waitUntil(caches.open('iwonde-v2').then((cache) => cache.addAll(['/'])));
          });
          self.addEventListener('fetch', (e) => {
            e.respondWith(caches.match(e.request).then((response) => response || fetch(e.request)));
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl).catch(() => {});
      });
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const BILLBOARD_DATABASE = [
      { id: "bb001", name: "Eye Care Associates", lat: 31.616787, lng: -89.188387, photo: "https://i.imgur.com/k9cNN2v.jpg", heading: "S", location: "E/S Hwy 11, .9 M N of Hwy 29", type: "static" },
      { id: "bb002", name: "Joiner Insurance", lat: 31.60608, lng: -89.21377, photo: "https://i.imgur.com/QbXiDYL.jpg", heading: "N", location: "E/S I-59, .6 M S of Hwy 29", type: "static" },
      { id: "bb003", name: "Dr. Suber", lat: 31.601909, lng: -89.199899, photo: "https://i.imgur.com/281oZoi.jpg", heading: "N", location: "E/S Hwy 11, .3 M S of Hwy 29", type: "static" },
      { id: "bb004", name: "kaRocks", lat: 31.606183, lng: -89.197968, photo: "https://i.imgur.com/h00xJ1F.jpg", heading: "N", location: "S/S Hill Street, .1 M W of Hwy 11", type: "static" },
      { id: "bb005", name: "Kim's No Bull", lat: 31.681, lng: -89.15368, photo: "https://i.imgur.com/sM6CRFy.jpg", heading: "N", location: "E/S I-59, .4 M S of Hwy 15", type: "static" },
      { id: "bb006", name: "Legacy Chevrolet", lat: 31.692387, lng: -89.14678, photo: "https://i.imgur.com/9AJ5y1U.jpg", heading: "S", location: "W/S Hwy 15, .2 M S of Hwy 84", type: "static" },
      { id: "bb007", name: "WNW", lat: 31.692387, lng: -89.14678, photo: "https://i.imgur.com/iVYiENn.jpg", heading: "N", location: "W/S Hwy 15, .2 M S of Hwy 84", type: "static" },
      { id: "bb008", name: "McDonald's", lat: 31.687407, lng: -89.146407, photo: "https://i.imgur.com/ROEnNmI.jpg", heading: "N", location: "E/S Hwy 15, .5 M S of US Hwy 84", type: "static" },
      { id: "bb009", name: "Blank", lat: 31.616787, lng: -89.188387, photo: "https://i.imgur.com/hDI3Jsd.jpg", heading: "N", location: "E/S Hwy 11, .9 M N of Hwy 29", type: "static" },
      { id: "bb010", name: "Love's", lat: 31.375996, lng: -89.329703, photo: "https://i.imgur.com/tX9Qvfy.jpg", heading: "S", location: "W/S I-59, 1.6 M N of Hwy 49", type: "static" },
      { id: "bb011", name: "Endom", lat: 31.60608, lng: -89.21377, photo: "https://i.imgur.com/cj5EGyo.jpg", heading: "S", location: "E/S I-59, .6 M S of Hwy 29", type: "static" }
    ];

    const CheckCircle = () => <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const Clock = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const BarChart3 = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>;
    const Navigation = () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>;

    function App() {
      const [screen, setScreen] = useState('drive');
      const [marks, setMarks] = useState([]);
      const [location, setLocation] = useState(null);
      const [speed, setSpeed] = useState(0);
      const [heading, setHeading] = useState(null);
      const [gpsError, setGpsError] = useState(null);

      const getBufferDistance = (s) => s <= 15 ? 100 : s <= 30 ? 300 : s <= 45 ? 500 : s <= 60 ? 1850 : 2640;

      const calculateDistance = (lat1, lng1, lat2, lng2) => {
        const R = 20902464;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng/2) * Math.sin(dLng/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      };

      const findNearbyBillboards = () => {
        if (!location) return [];
        const bufferDistance = getBufferDistance(speed);
        return BILLBOARD_DATABASE
          .map(bb => ({ ...bb, distance: calculateDistance(location.latitude, location.longitude, bb.lat, bb.lng) }))
          .filter(bb => bb.distance <= bufferDistance)
          .sort((a, b) => a.distance - b.distance);
      };

      useEffect(() => {
        if (!navigator.geolocation) {
          setGpsError('GPS not supported');
          return;
        }
        const watchId = navigator.geolocation.watchPosition(
          (p) => {
            setLocation({ latitude: p.coords.latitude, longitude: p.coords.longitude, accuracy: p.coords.accuracy });
            setSpeed(Math.round((p.coords.speed || 0) * 2.23694));
            setHeading(p.coords.heading);
            setGpsError(null);
          },
          (error) => setGpsError(error.message),
          { enableHighAccuracy: true, maximumAge: 1000, timeout: 5000 }
        );
        return () => navigator.geolocation.clearWatch(watchId);
      }, []);

      const handleMark = () => {
        if (!location) {
          if (navigator.vibrate) navigator.vibrate(200);
          return;
        }
        
        const timestamp = new Date();
        const nearby = findNearbyBillboards();
        const bufferDistance = getBufferDistance(speed);

        if (nearby.length === 0) {
          if (navigator.vibrate) navigator.vibrate(200);
          return;
        }

        // Always save the closest billboard - ALLOWS DUPLICATES
        const mark = {
          id: `mark_${Date.now()}`,
          timestamp,
          billboard: nearby[0],
          userLocation: { ...location },
          speed,
          heading,
          distance: nearby[0].distance,
          bufferUsed: bufferDistance,
          billboardsInRange: nearby.length,
          autoMatched: true,
          confidence: nearby.length === 1 ? 'high' : 'auto-closest'
        };
        
        setMarks([mark, ...marks]); // Add to front (newest first)
        if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
      };

      const getStats = () => {
        if (marks.length === 0) return null;
        const avgDistance = marks.reduce((sum, m) => sum + m.distance, 0) / marks.length;
        const uniqueBoards = new Set(marks.map(m => m.billboard.id)).size;
        return {
          total: marks.length,
          uniqueBoards,
          avgDistance: Math.round(avgDistance),
          minDistance: Math.round(Math.min(...marks.map(m => m.distance))),
          maxDistance: Math.round(Math.max(...marks.map(m => m.distance)))
        };
      };

      const stats = getStats();

      return (
        <div style={{ width: '100%', height: '100%', backgroundColor: '#000' }}>
          {/* Bottom Navigation - ALWAYS VISIBLE */}
          <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, backgroundColor: '#1a1a1a', borderTop: '1px solid #333', display: 'flex', maxWidth: '430px', margin: '0 auto', zIndex: 100 }}>
            {[
              { id: 'drive', icon: Navigation, label: 'Drive' },
              { id: 'replay', icon: Clock, label: 'Replay' },
              { id: 'stats', icon: BarChart3, label: 'Stats' }
            ].map(tab => (
              <button key={tab.id} onClick={() => setScreen(tab.id)} style={{ flex: 1, padding: '16px', backgroundColor: screen === tab.id ? '#2a2a2a' : 'transparent', border: 'none', cursor: 'pointer', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px' }}>
                <tab.icon />
                <span style={{ fontSize: '12px', fontWeight: '600', color: screen === tab.id ? '#10b981' : '#666' }}>{tab.label}</span>
              </button>
            ))}
          </div>

          {/* DRIVE SCREEN */}
          {screen === 'drive' && (
            <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '20px', paddingBottom: '100px' }}>
              <div style={{ position: 'fixed', top: 0, left: 0, right: 0, padding: '40px 20px 20px', textAlign: 'center', background: 'linear-gradient(to bottom, #000 0%, transparent 100%)' }}>
                <div style={{ fontSize: '56px', fontWeight: '900', color: '#10b981', lineHeight: 1 }}>{speed}</div>
                <div style={{ fontSize: '14px', color: '#666', fontWeight: '600', marginTop: '4px' }}>MPH • {marks.length} MARKS</div>
              </div>
              
              <button onClick={handleMark} style={{ width: '280px', height: '280px', borderRadius: '50%', background: 'linear-gradient(135deg, #10b981 0%, #059669 100%)', border: 'none', cursor: 'pointer', boxShadow: '0 20px 60px rgba(16, 185, 129, 0.5)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: '16px' }} onTouchStart={(e) => { e.currentTarget.style.transform = 'scale(0.95)'; }} onTouchEnd={(e) => { e.currentTarget.style.transform = 'scale(1)'; }}>
                <CheckCircle />
                <div style={{ fontSize: '36px', fontWeight: '900', color: 'white', letterSpacing: '0.05em' }}>MARK</div>
              </button>

              {gpsError && (
                <div style={{ position: 'fixed', bottom: '100px', left: '20px', right: '20px', padding: '16px', backgroundColor: '#7f1d1d', borderRadius: '12px', textAlign: 'center' }}>
                  <div style={{ fontSize: '14px', fontWeight: '600', color: '#fca5a5' }}>{gpsError}</div>
                </div>
              )}
            </div>
          )}

          {/* REPLAY SCREEN */}
          {screen === 'replay' && (
            <div style={{ padding: '20px', paddingTop: '60px', paddingBottom: '100px', minHeight: '100vh', overflowY: 'auto' }}>
              <h1 style={{ fontSize: '32px', fontWeight: '800', color: 'white', marginBottom: '8px' }}>All Marks</h1>
              <p style={{ fontSize: '15px', color: '#666', marginBottom: '24px' }}>{marks.length} total marks</p>
              
              {marks.length === 0 ? (
                <div style={{ backgroundColor: '#1a1a1a', borderRadius: '20px', padding: '48px 24px', textAlign: 'center' }}>
                  <div style={{ fontSize: '48px', marginBottom: '16px' }}>📍</div>
                  <div style={{ fontSize: '18px', fontWeight: '600', color: '#999' }}>No marks yet</div>
                </div>
              ) : (
                <div style={{ display: 'grid', gap: '16px' }}>
                  {marks.map((mark, index) => (
                    <div key={mark.id} style={{ backgroundColor: '#1a1a1a', borderRadius: '20px', overflow: 'hidden', border: '2px solid #333' }}>
                      <img src={mark.billboard.photo} alt={mark.billboard.name} style={{ width: '100%', height: '180px', objectFit: 'cover' }} />
                      <div style={{ padding: '20px' }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '12px' }}>
                          <h3 style={{ fontSize: '20px', fontWeight: '700', color: 'white', flex: 1 }}>{mark.billboard.name}</h3>
                          <div style={{ fontSize: '12px', fontWeight: '700', backgroundColor: '#333', color: '#999', padding: '4px 10px', borderRadius: '6px' }}>
                            #{marks.length - index}
                          </div>
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '12px', fontSize: '13px', color: '#999' }}>
                          <div>
                            <div style={{ marginBottom: '4px' }}>Distance</div>
                            <div style={{ color: '#10b981', fontWeight: '700', fontSize: '16px' }}>{Math.round(mark.distance)} ft</div>
                          </div>
                          <div>
                            <div style={{ marginBottom: '4px' }}>Speed</div>
                            <div style={{ color: 'white', fontWeight: '700', fontSize: '16px' }}>{mark.speed} mph</div>
                          </div>
                          <div>
                            <div style={{ marginBottom: '4px' }}>Time</div>
                            <div style={{ color: 'white', fontWeight: '700', fontSize: '13px' }}>{mark.timestamp.toLocaleTimeString()}</div>
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* STATS SCREEN */}
          {screen === 'stats' && (
            <div style={{ padding: '20px', paddingTop: '60px', paddingBottom: '100px', minHeight: '100vh', overflowY: 'auto' }}>
              <h1 style={{ fontSize: '32px', fontWeight: '800', color: 'white', marginBottom: '8px' }}>Stats</h1>
              <p style={{ fontSize: '15px', color: '#666', marginBottom: '24px' }}>Test results</p>
              
              {!stats ? (
                <div style={{ backgroundColor: '#1a1a1a', borderRadius: '20px', padding: '48px 24px', textAlign: 'center' }}>
                  <div style={{ fontSize: '48px', marginBottom: '16px' }}>📊</div>
                  <div style={{ fontSize: '18px', fontWeight: '600', color: '#999' }}>No data yet</div>
                </div>
              ) : (
                <div style={{ display: 'grid', gap: '16px' }}>
                  <div style={{ background: 'linear-gradient(135deg, #10b981 0%, #059669 100%)', borderRadius: '20px', padding: '32px', textAlign: 'center' }}>
                    <div style={{ fontSize: '64px', fontWeight: '900', color: 'white' }}>{stats.total}</div>
                    <div style={{ fontSize: '18px', color: 'rgba(255,255,255,0.9)', fontWeight: '700' }}>Total Marks</div>
                  </div>
                  
                  <div style={{ backgroundColor: '#1a1a1a', borderRadius: '20px', padding: '24px' }}>
                    <div style={{ fontSize: '40px', fontWeight: '800', color: '#10b981' }}>{stats.uniqueBoards}</div>
                    <div style={{ fontSize: '14px', color: '#999' }}>Unique Billboards</div>
                  </div>

                  <div style={{ backgroundColor: '#1a1a1a', borderRadius: '20px', padding: '24px' }}>
                    <div style={{ fontSize: '40px', fontWeight: '800', color: '#10b981' }}>{stats.avgDistance} ft</div>
                    <div style={{ fontSize: '14px', color: '#999', marginBottom: '12px' }}>Average Distance</div>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', fontSize: '13px', color: '#666' }}>
                      <div>
                        <div>Min: <span style={{ color: '#10b981', fontWeight: '700' }}>{stats.minDistance} ft</span></div>
                      </div>
                      <div>
                        <div>Max: <span style={{ color: '#f59e0b', fontWeight: '700' }}>{stats.maxDistance} ft</span></div>
                      </div>
                    </div>
                  </div>

                  <button onClick={() => { const data = JSON.stringify(marks, null, 2); const blob = new Blob([data], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `iwonde-test-${Date.now()}.json`; a.click(); }} style={{ width: '100%', padding: '20px', background: 'linear-gradient(135deg, #10b981 0%, #059669 100%)', border: 'none', borderRadius: '16px', color: 'white', fontSize: '16px', fontWeight: '700', cursor: 'pointer' }}>
                    📊 Export All Marks
                  </button>

                  <button onClick={() => { if (confirm('Clear all marks?')) setMarks([]); }} style={{ width: '100%', padding: '16px', backgroundColor: '#7f1d1d', border: 'none', borderRadius: '12px', color: '#fca5a5', fontSize: '14px', fontWeight: '600', cursor: 'pointer' }}>
                    🗑️ Clear All Marks
                  </button>
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
