<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>iWonde Test</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #000000;
      overflow-x: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }
    #root {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // BILLBOARD DATABASE - Jones County, MS
    const BILLBOARD_DATABASE = [
      {
        id: "bb001",
        name: "Eye Care Associates",
        lat: 31.616787,
        lng: -89.188387,
        photo: "https://i.imgur.com/k9cNN2v.jpg",
        heading: "S",
        location: "E/S Hwy 11, .9 M N of Hwy 29",
        type: "static"
      },
      {
        id: "bb002",
        name: "Joiner Insurance",
        lat: 31.60608,
        lng: -89.21377,
        photo: "https://i.imgur.com/QbXiDYL.jpg",
        heading: "N",
        location: "E/S I-59, .6 M S of Hwy 29",
        type: "static"
      },
      {
        id: "bb003",
        name: "Dr. Suber",
        lat: 31.601909,
        lng: -89.199899,
        photo: "https://i.imgur.com/281oZoi.jpg",
        heading: "N",
        location: "E/S Hwy 11, .3 M S of Hwy 29",
        type: "static"
      },
      {
        id: "bb004",
        name: "kaRocks",
        lat: 31.606183,
        lng: -89.197968,
        photo: "https://i.imgur.com/h00xJ1F.jpg",
        heading: "N",
        location: "S/S Hill Street, .1 M W of Hwy 11",
        type: "static"
      },
      {
        id: "bb005",
        name: "Kim's No Bull",
        lat: 31.681,
        lng: -89.15368,
        photo: "https://i.imgur.com/sM6CRFy.jpg",
        heading: "N",
        location: "E/S I-59, .4 M S of Hwy 15",
        type: "static"
      },
      {
        id: "bb006",
        name: "Legacy Chevrolet",
        lat: 31.692387,
        lng: -89.14678,
        photo: "https://i.imgur.com/9AJ5y1U.jpg",
        heading: "S",
        location: "W/S Hwy 15, .2 M S of Hwy 84",
        type: "static"
      },
      {
        id: "bb007",
        name: "WNW",
        lat: 31.692387,
        lng: -89.14678,
        photo: "https://i.imgur.com/iVYiENn.jpg",
        heading: "N",
        location: "W/S Hwy 15, .2 M S of Hwy 84",
        type: "static"
      },
      {
        id: "bb008",
        name: "McDonald's",
        lat: 31.687407,
        lng: -89.146407,
        photo: "https://i.imgur.com/ROEnNmI.jpg",
        heading: "N",
        location: "E/S Hwy 15, .5 M S of US Hwy 84",
        type: "static"
      },
      {
        id: "bb009",
        name: "Blank",
        lat: 31.616787,
        lng: -89.188387,
        photo: "https://i.imgur.com/hDI3Jsd.jpg",
        heading: "N",
        location: "E/S Hwy 11, .9 M N of Hwy 29",
        type: "static"
      },
      {
        id: "bb010",
        name: "Love's",
        lat: 31.375996,
        lng: -89.329703,
        photo: "https://i.imgur.com/tX9Qvfy.jpg",
        heading: "S",
        location: "W/S I-59, 1.6 M N of Hwy 49",
        type: "static"
      },
      {
        id: "bb011",
        name: "Endom",
        lat: 31.60608,
        lng: -89.21377,
        photo: "https://i.imgur.com/cj5EGyo.jpg",
        heading: "S",
        location: "E/S I-59, .6 M S of Hwy 29",
        type: "static"
      }
    ];

    // Icons
    const CheckCircle = () => <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>;
    const Clock = () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
    const BarChart3 = () => <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>;

    function IWondeApp() {
      const [screen, setScreen] = useState('drive');
      const [marks, setMarks] = useState([]);
      const [pendingSelection, setPendingSelection] = useState(null);
      const [showSelectionScreen, setShowSelectionScreen] = useState(false);
      
      const [location, setLocation] = useState(null);
      const [speed, setSpeed] = useState(0);
      const [heading, setHeading] = useState(null);
      const [gpsError, setGpsError] = useState(null);

      // Speed-based buffer (in feet)
      const getBufferDistance = (speedMph) => {
        if (speedMph <= 15) return 100;
        if (speedMph <= 30) return 300;
        if (speedMph <= 45) return 500;
        if (speedMph <= 60) return 1850;
        return 2640;
      };

      // Haversine distance
      const calculateDistance = (lat1, lng1, lat2, lng2) => {
        const R = 20902464;
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLng = (lng2 - lng1) * Math.PI / 180;
        const a = 
          Math.sin(dLat/2) * Math.sin(dLat/2) +
          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
          Math.sin(dLng/2) * Math.sin(dLng/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
      };

      const findNearbyBillboards = () => {
        if (!location) return [];
        const bufferDistance = getBufferDistance(speed);
        return BILLBOARD_DATABASE
          .map(bb => ({
            ...bb,
            distance: calculateDistance(location.latitude, location.longitude, bb.lat, bb.lng)
          }))
          .filter(bb => bb.distance <= bufferDistance)
          .sort((a, b) => a.distance - b.distance);
      };

      // GPS tracking
      useEffect(() => {
        if (!navigator.geolocation) {
          setGpsError('GPS not supported');
          return;
        }

        const watchId = navigator.geolocation.watchPosition(
          (position) => {
            setLocation({
              latitude: position.coords.latitude,
              longitude: position.coords.longitude,
              accuracy: position.coords.accuracy
            });
            const speedMps = position.coords.speed || 0;
            setSpeed(Math.round(speedMps * 2.23694));
            setHeading(position.coords.heading);
            setGpsError(null);
          },
          (error) => setGpsError(error.message),
          { enableHighAccuracy: true, maximumAge: 1000, timeout: 5000 }
        );

        return () => navigator.geolocation.clearWatch(watchId);
      }, []);

      const handleMark = () => {
        if (!location) {
          if (navigator.vibrate) navigator.vibrate(200);
          return;
        }

        const timestamp = new Date();
        const nearby = findNearbyBillboards();
        const bufferDistance = getBufferDistance(speed);

        if (nearby.length === 0) {
          if (navigator.vibrate) navigator.vibrate(200);
          return;
        }

        if (nearby.length === 1) {
          const mark = {
            id: `mark_${Date.now()}`,
            timestamp,
            billboard: nearby[0],
            userLocation: { ...location },
            speed,
            heading,
            distance: nearby[0].distance,
            bufferUsed: bufferDistance,
            disambiguationNeeded: false,
            billboardsInRange: 1,
            autoMatched: true,
            confidence: 'high'
          };
          setMarks([mark, ...marks]);
          if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        } else {
          setPendingSelection({
            timestamp,
            options: nearby,
            userLocation: { ...location },
            speed,
            heading,
            bufferUsed: bufferDistance
          });
          if (speed === 0) setShowSelectionScreen(true);
          if (navigator.vibrate) navigator.vibrate([100, 100, 100]);
        }
      };

      const handleBillboardSelection = (selectedBillboard) => {
        const selectionTime = (Date.now() - pendingSelection.timestamp.getTime()) / 1000;
        const mark = {
          id: `mark_${Date.now()}`,
          timestamp: pendingSelection.timestamp,
          billboard: selectedBillboard,
          userLocation: pendingSelection.userLocation,
          speed: pendingSelection.speed,
          heading: pendingSelection.heading,
          distance: selectedBillboard.distance,
          bufferUsed: pendingSelection.bufferUsed,
          disambiguationNeeded: true,
          billboardsInRange: pendingSelection.options.length,
          optionsShown: pendingSelection.options.map(o => o.id),
          autoMatched: false,
          selectionTime,
          closestOption: pendingSelection.options[0].id,
          selectedWasClosest: selectedBillboard.id === pendingSelection.options[0].id,
          confidence: 'confirmed'
        };
        setMarks([mark, ...marks]);
        setShowSelectionScreen(false);
        setPendingSelection(null);
      };

      useEffect(() => {
        if (speed === 0 && pendingSelection && !showSelectionScreen) {
          setShowSelectionScreen(true);
        }
      }, [speed, pendingSelection]);

      const getStats = () => {
        if (marks.length === 0) return null;
        const autoMatched = marks.filter(m => m.autoMatched).length;
        const userSelected = marks.filter(m => !m.autoMatched).length;
        const avgDistance = marks.reduce((sum, m) => sum + m.distance, 0) / marks.length;
        return {
          total: marks.length,
          autoMatched,
          userSelected,
          autoMatchRate: (autoMatched / marks.length * 100).toFixed(1),
          avgDistance: Math.round(avgDistance)
        };
      };

      const stats = getStats();
      const isMoving = speed > 0;

      return (
        <div style={{ width: '100%', height: '100%', backgroundColor: '#000', position: 'relative' }}>
          {/* Selection Screen */}
          {showSelectionScreen && pendingSelection && !isMoving && (
            <div style={{
              position: 'fixed',
              top: 0,
              left: 0,
              right: 0,
              bottom: 0,
              backgroundColor: '#000',
              zIndex: 1000,
              overflowY: 'auto',
              padding: '20px'
            }}>
              <div style={{ maxWidth: '430px', margin: '0 auto', paddingTop: '60px' }}>
                <h2 style={{ fontSize: '28px', fontWeight: '800', color: 'white', marginBottom: '32px' }}>
                  Which billboard?
                </h2>
                <div style={{ display: 'grid', gap: '16px', marginBottom: '16px' }}>
                  {pendingSelection.options.map((billboard, index) => (
                    <button
                      key={billboard.id}
                      onClick={() => handleBillboardSelection(billboard)}
                      style={{
                        background: '#1a1a1a',
                        border: '2px solid #333',
                        borderRadius: '20px',
                        padding: '0',
                        cursor: 'pointer',
                        overflow: 'hidden'
                      }}
                    >
                      <img src={billboard.photo} alt={billboard.name} style={{ width: '100%', height: '180px', objectFit: 'cover', display: 'block' }} />
                      <div style={{ padding: '20px', textAlign: 'left' }}>
                        <div style={{ fontSize: '22px', fontWeight: '700', color: 'white', marginBottom: '8px' }}>
                          {billboard.name}
                          {index === 0 && <span style={{ marginLeft: '8px', fontSize: '12px', backgroundColor: '#10b981', color: 'white', padding: '4px 10px', borderRadius: '8px' }}>CLOSEST</span>}
                        </div>
                        <div style={{ fontSize: '18px', color: '#10b981', fontWeight: '700' }}>
                          {Math.round(billboard.distance)} feet
                        </div>
                      </div>
                    </button>
                  ))}
                </div>
                <button
                  onClick={() => { setShowSelectionScreen(false); setPendingSelection(null); }}
                  style={{ width: '100%', padding: '20px', backgroundColor: '#1a1a1a', border: '2px solid #333', borderRadius: '16px', color: '#999', fontSize: '16px', fontWeight: '600', cursor: 'pointer' }}
                >
                  Skip
                </button>
              </div>
            </div>
          )}

          {/* DRIVING MODE */}
          {isMoving && screen === 'drive' && (
            <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '20px' }}>
              <div style={{ position: 'fixed', top: 0, left: 0, right: 0, padding: '40px 20px 20px', textAlign: 'center', background: 'linear-gradient(to bottom, #000 0%, transparent 100%)' }}>
                <div style={{ fontSize: '56px', fontWeight: '900', color: '#10b981', lineHeight: 1 }}>{speed}</div>
                <div style={{ fontSize: '14px', color: '#666', fontWeight: '600', marginTop: '4px' }}>
                  MPH • {marks.length} MARKED
                </div>
              </div>

              <button
                onClick={handleMark}
                style={{
                  width: '280px',
                  height: '280px',
                  borderRadius: '50%',
                  background: 'linear-gradient(135deg, #10b981 0%, #059669 100%)',
                  border: 'none',
                  cursor: 'pointer',
                  boxShadow: '0 20px 60px rgba(16, 185, 129, 0.5)',
                  display: 'flex',
                  flexDirection: 'column',
                  alignItems: 'center',
                  justifyContent: 'center',
                  gap: '16px'
                }}
                onTouchStart={(e) => { e.currentTarget.style.transform = 'scale(0.95)'; }}
                onTouchEnd={(e) => { e.currentTarget.style.transform = 'scale(1)'; }}
              >
                <CheckCircle />
                <div style={{ fontSize: '36px', fontWeight: '900', color: 'white', letterSpacing: '0.05em' }}>MARK</div>
              </button>

              {pendingSelection && (
                <div style={{ position: 'fixed', bottom: '40px', left: '20px', right: '20px', padding: '20px', backgroundColor: '#f59e0b', borderRadius: '16px', textAlign: 'center' }}>
                  <div style={{ fontSize: '16px', fontWeight: '700', color: 'white' }}>⏸ Pull over to select billboard</div>
                </div>
              )}
            </div>
          )}

          {/* STOPPED MODE */}
          {!isMoving && (
            <>
              <div style={{ position: 'fixed', bottom: 0, left: 0, right: 0, backgroundColor: '#1a1a1a', borderTop: '1px solid #333', display: 'flex', maxWidth: '430px', margin: '0 auto', zIndex: 100 }}>
                {[
                  { id: 'drive', icon: CheckCircle, label: 'Drive' },
                  { id: 'replay', icon: Clock, label: 'Replay' },
                  { id: 'stats', icon: BarChart3, label: 'Stats' }
                ].map(tab => (
                  <button
                    key={tab.id}
                    onClick={() => setScreen(tab.id)}
                    style={{
                      flex: 1,
                      padding: '16px',
                      backgroundColor: screen === tab.id ? '#2a2a2a' : 'transparent',
                      border: 'none',
                      cursor: 'pointer',
                      display: 'flex',
                      flexDirection: 'column',
                      alignItems: 'center',
                      gap: '4px'
                    }}
                  >
                    <div style={{ width: '22px', height: '22px' }}><tab.icon /></div>
                    <span style={{ fontSize: '12px', fontWeight: '600', color: screen === tab.id ? '#10b981' : '#666' }}>{tab.label}</span>
                  </button>
                ))}
              </div>

              {screen === 'drive' && (
                <div style={{ padding: '20px', paddingTop: '60px', paddingBottom: '100px', minHeight: '100vh' }}>
                  <h1 style={{ fontSize: '32px', fontWeight: '800', color: 'white', marginBottom: '8px' }}>Ready to Drive</h1>
                  <p style={{ fontSize: '15px', color: '#666', marginBottom: '32px' }}>Start driving to test</p>
                  
                  {gpsError ? (
                    <div style={{ backgroundColor: '#7f1d1d', borderRadius: '16px', padding: '20px' }}>
                      <div style={{ fontSize: '16px', fontWeight: '700', color: 'white' }}>GPS Error</div>
                      <div style={{ fontSize: '14px', color: '#fca5a5', marginTop: '8px' }}>{gpsError}</div>
                    </div>
                  ) : location ? (
                    <div style={{ backgroundColor: '#1a1a1a', borderRadius: '16px', padding: '20px' }}>
                      <div style={{ fontSize: '14px', color: '#666', marginBottom: '12px', fontWeight: '600' }}>GPS ACTIVE</div>
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', fontSize: '13px', color: '#999' }}>
                        <div>
                          <div style={{ marginBottom: '4px' }}>Accuracy</div>
                          <div style={{ color: 'white', fontWeight: '700' }}>±{Math.round(location.accuracy)} ft</div>
                        </div>
                        <div>
                          <div style={{ marginBottom: '4px' }}>Location</div>
                          <div style={{ color: 'white', fontWeight: '700', fontSize: '11px' }}>
                            {location.latitude.toFixed(4)}, {location.longitude.toFixed(4)}
                          </div>
                        </div>
                      </div>
                    </div>
                  ) : (
                    <div style={{ backgroundColor: '#1a1a1a', borderRadius: '16px', padding: '40px 20px', textAlign: 'center' }}>
                      <div style={{ fontSize: '16px', color: '#666' }}>Acquiring GPS...</div>
                    </div>
                  )}
                </div>
              )}

              {screen === 'replay' && (
                <div style={{ padding: '20px', paddingTop: '60px', paddingBottom: '100px', minHeight: '100vh' }}>
                  <h1 style={{ fontSize: '32px', fontWeight: '800', color: 'white', marginBottom: '8px' }}>Replay</h1>
                  <p style={{ fontSize: '15px', color: '#666', marginBottom: '24px' }}>{marks.length} marked</p>
                  
                  {marks.length === 0 ? (
                    <div style={{ backgroundColor: '#1a1a1a', borderRadius: '20px', padding: '48px 24px', textAlign: 'center' }}>
                      <Clock />
                      <div style={{ fontSize: '18px', fontWeight: '600', color: '#999', marginTop: '16px' }}>No billboards marked yet</div>
                    </div>
                  ) : (
                    <div style={{ display: 'grid', gap: '16px' }}>
                      {marks.map(mark => (
                        <div key={mark.id} style={{ backgroundColor: '#1a1a1a', borderRadius: '20px', overflow: 'hidden', border: '2px solid #333' }}>
                          <img src={mark.billboard.photo} alt={mark.billboard.name} style={{ width: '100%', height: '180px', objectFit: 'cover' }} />
                          <div style={{ padding: '20px' }}>
                            <h3 style={{ fontSize: '20px', fontWeight: '700', color: 'white', marginBottom: '12px' }}>{mark.billboard.name}</h3>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px', fontSize: '13px', color: '#999' }}>
                              <div>
                                <div style={{ marginBottom: '4px' }}>Distance</div>
                                <div style={{ color: '#10b981', fontWeight: '700', fontSize: '16px' }}>{Math.round(mark.distance)} ft</div>
                              </div>
                              <div>
                                <div style={{ marginBottom: '4px' }}>Speed</div>
                                <div style={{ color: 'white', fontWeight: '700', fontSize: '16px' }}>{mark.speed} mph</div>
                              </div>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}

              {screen === 'stats' && (
                <div style={{ padding: '20px', paddingTop: '60px', paddingBottom: '100px', minHeight: '100vh' }}>
                  <h1 style={{ fontSize: '32px', fontWeight: '800', color: 'white', marginBottom: '8px' }}>Stats</h1>
                  <p style={{ fontSize: '15px', color: '#666', marginBottom: '24px' }}>Test results</p>
                  
                  {!stats ? (
                    <div style={{ backgroundColor: '#1a1a1a', borderRadius: '20px', padding: '48px 24px', textAlign: 'center' }}>
                      <BarChart3 />
                      <div style={{ fontSize: '18px', fontWeight: '600', color: '#999', marginTop: '16px' }}>No data yet</div>
                    </div>
                  ) : (
                    <div style={{ display: 'grid', gap: '16px' }}>
                      <div style={{ background: 'linear-gradient(135deg, #10b981 0%, #059669 100%)', borderRadius: '20px', padding: '32px', textAlign: 'center' }}>
                        <div style={{ fontSize: '64px', fontWeight: '900', color: 'white' }}>{stats.total}</div>
                        <div style={{ fontSize: '18px', color: 'rgba(255,255,255,0.9)', fontWeight: '700' }}>Total Marks</div>
                      </div>
                      <div style={{ backgroundColor: '#1a1a1a', borderRadius: '20px', padding: '24px' }}>
                        <div style={{ fontSize: '40px', fontWeight: '800', color: '#10b981' }}>{stats.avgDistance} ft</div>
                        <div style={{ fontSize: '14px', color: '#999' }}>Average Distance</div>
                      </div>
                      <div style={{ backgroundColor: '#1a1a1a', borderRadius: '20px', padding: '24px' }}>
                        <div style={{ fontSize: '40px', fontWeight: '800', color: '#10b981' }}>{stats.autoMatchRate}%</div>
                        <div style={{ fontSize: '14px', color: '#999', marginBottom: '8px' }}>Auto-Match Rate</div>
                        <div style={{ fontSize: '13px', color: '#666' }}>{stats.autoMatched} auto / {stats.userSelected} manual</div>
                      </div>
                      <button
                        onClick={() => {
                          const data = JSON.stringify(marks, null, 2);
                          const blob = new Blob([data], { type: 'application/json' });
                          const url = URL.createObjectURL(blob);
                          const a = document.createElement('a');
                          a.href = url;
                          a.download = `iwonde-test-${Date.now()}.json`;
                          a.click();
                        }}
                        style={{
                          width: '100%',
                          padding: '20px',
                          background: 'linear-gradient(135deg, #10b981 0%, #059669 100%)',
                          border: 'none',
                          borderRadius: '16px',
                          color: 'white',
                          fontSize: '16px',
                          fontWeight: '700',
                          cursor: 'pointer'
                        }}
                      >
                        📊 Export Test Data
                      </button>
                    </div>
                  )}
                </div>
              )}
            </>
          )}
        </div>
      );
    }

    ReactDOM.render(<IWondeApp />, document.getElementById('root'));
  </script>
</body>
</html>
